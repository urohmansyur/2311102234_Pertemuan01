<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Bagi-bagi THR</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="text-center">
        <h2 class="fw-bold mb-4">Bagi bagi THR</h2>

        <button
          class="btn btn-danger p-4"
          onclick="ambilTHR()"
          data-bs-toggle="modal"
          data-bs-target="#thrModal"
        >
          <i class="bi bi-envelope-fill" style="font-size: 100px"></i>
        </button>

        <p class="text-muted mt-3">Klik amplop untuk membuka THR</p>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="thrModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center border-0">
          <div class="modal-header border-0">
            <h5 class="modal-title">Dari aunty yang kaya</h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <h4 class="text-success">Selamat anda mendapatkan THR</h4>

            <h1 id="jumlahThr" class="mt-3"></h1>

            <div id="confetti" class="mt-3 fs-3"></div>
          </div>

          <div class="modal-footer border-0 justify-content-center">
            <button class="btn btn-success px-4" data-bs-dismiss="modal">
              Ambil
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function ambilTHR() {
        let thr = [
          "Rp 50.000",
          "Rp 100.000",
          "Rp 200.000",
          "Rp 500.000",
          "Rp 1.000.000",
        ];

        let random = thr[Math.floor(Math.random() * thr.length)];

        document.getElementById("jumlahThr").innerText = random;

        let efek = "";

        for (let i = 0; i < 20; i++) {
          efek += "🎉";
        }

        document.getElementById("confetti").innerHTML = efek;
      }
    </script>
  </body>
</html>
